<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131417">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<title>Fierros</title>
<style>
:root{
  --bg:#131417; --card:#1c1f24; --card2:#23262d; --line:#2d323a;
  --ink:#eceef1; --mut:#9aa0a9; --dim:#686d75;
  --chalk:#f2efe7;
  --red:#d64949; --blue:#4a86d4; --yellow:#dca62f; --green:#4ea86a;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  font-size:16px; line-height:1.45;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,textarea{font:inherit;color:var(--ink);background:var(--card2);border:1px solid var(--line);border-radius:10px}
input:focus-visible,textarea:focus-visible,button:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}
.num{font-family:ui-monospace,'Roboto Mono',Menlo,monospace;font-variant-numeric:tabular-nums}

/* ---- header ---- */
header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 20px 6px;
}
.brand{font-weight:800;letter-spacing:.22em;font-size:15px;text-transform:uppercase}
.brand small{color:var(--dim);letter-spacing:.05em;font-weight:600;text-transform:none}
.hdate{color:var(--mut);font-size:13px}

/* ---- layout ---- */
main{padding:10px 16px 24px;max-width:560px;margin:0 auto}
.eyebrow{color:var(--dim);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:18px 4px 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.empty{color:var(--mut);text-align:center;padding:40px 24px;font-size:15px}

/* bumper plate: the day marker */
.plate{width:24px;height:24px;border-radius:50%;border:7px solid var(--c,var(--dim));flex:none}
.plate.sm{width:16px;height:16px;border-width:5px}
.c-red{--c:var(--red)} .c-blue{--c:var(--blue)} .c-yellow{--c:var(--yellow)} .c-green{--c:var(--green)}

/* day launcher */
.daybtn{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 16px;margin-bottom:12px;
}
.daybtn:active{background:var(--card2)}
.daybtn .dn{font-weight:800;font-size:19px}
.daybtn .ds{color:var(--mut);font-size:13px;margin-top:2px}
.daybtn .go{margin-left:auto;color:var(--dim);font-size:22px}

/* buttons */
.btn{
  display:block;width:100%;text-align:center;font-weight:800;font-size:17px;
  background:var(--chalk);color:#131417;border-radius:14px;padding:15px;margin-top:6px;
}
.btn:active{opacity:.85}
.btn.line{background:none;color:var(--ink);border:1px solid var(--line)}
.btn.danger{background:none;color:var(--red);border:1px solid var(--line)}
.ghost{color:var(--mut);font-size:14px;font-weight:600;padding:10px 12px;border:1px solid var(--line);border-radius:10px}
.ghost.danger{color:var(--red)}
.linkbtn{color:var(--mut);font-size:14px;font-weight:600;padding:8px}

/* session */
.sesshead{display:flex;align-items:center;gap:12px;margin:8px 4px 16px}
.sesshead .dn{font-weight:800;font-size:22px}
.sesshead .dd{color:var(--mut);font-size:13px}
.sesshead .right{margin-left:auto}
.exname{font-weight:800;font-size:17px;background:none;border:none;border-radius:0;width:100%;padding:0}
.exname::placeholder{color:var(--dim)}
.target{color:var(--mut);font-size:13px;margin-top:2px}
.sets{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.setrow{display:flex;align-items:center;gap:8px}
.setrow .setn{color:var(--dim);font-size:13px;width:16px;text-align:center;flex:none}
.setrow input{height:46px;text-align:center;font-size:17px;min-width:0}
.setrow .win{flex:1.2}
.setrow .rin{flex:1}
.setrow .x{color:var(--dim)}
.chk{
  width:46px;height:46px;flex:none;border:1px solid var(--line);border-radius:10px;
  color:var(--dim);font-size:18px;transition:background .15s,color .15s;
}
.setrow.done .chk{background:var(--green);border-color:var(--green);color:#0e1411}
.setrow.done input{opacity:.65}
.exfoot{display:flex;gap:8px;margin-top:12px}
.exfoot .spacer{flex:1}
textarea.notes{width:100%;min-height:74px;padding:12px;margin-top:4px;resize:vertical}

/* history */
.log{padding:0;overflow:hidden}
.loghead{display:flex;align-items:center;gap:12px;padding:16px;width:100%;text-align:left}
.loghead .dn{font-weight:800;font-size:17px}
.loghead .ds{color:var(--mut);font-size:13px;margin-top:1px}
.loghead .car{margin-left:auto;color:var(--dim)}
.logbody{border-top:1px solid var(--line);padding:14px 16px}
.logbody .lex{margin-bottom:12px}
.logbody .lex:last-child{margin-bottom:0}
.lex .lname{font-weight:700;font-size:15px}
.lex .lsets{color:var(--mut);font-size:14px;margin-top:2px}
.lex .ltarget{color:var(--dim);font-size:12px}
.lnotes{color:var(--mut);font-size:14px;border-top:1px dashed var(--line);padding-top:10px;margin-top:12px;white-space:pre-wrap}
.logactions{display:flex;justify-content:flex-end;padding:4px 8px 8px}

/* routine editor */
.rday .rhead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.rday .rname{font-weight:800;font-size:18px;background:none;border:none;border-radius:0;flex:1;min-width:0;padding:4px 0}
.rex{width:100%;text-align:left;display:flex;align-items:baseline;gap:10px;padding:12px 4px;border-top:1px solid var(--line)}
.rex .rn{font-weight:600;flex:1}
.rex .rs{color:var(--mut);font-size:14px;flex:none}
.redit{border-top:1px solid var(--line);padding:12px 4px;display:flex;flex-direction:column;gap:10px}
.redit .row{display:flex;gap:8px}
.redit label{display:block;color:var(--dim);font-size:12px;margin-bottom:4px}
.redit input{width:100%;height:44px;padding:0 10px;font-size:16px}
.redit .f1{flex:1}.redit .f2{flex:2}
.redit .acts{display:flex;gap:8px}
.plate.btnp{cursor:pointer}

/* data */
.datainfo{color:var(--mut);font-size:14px;margin-bottom:14px}
textarea.io{width:100%;min-height:110px;padding:12px;font-size:13px}
.warn{background:#3a2b17;border:1px solid #6b4c1e;color:#e8c98a;border-radius:12px;padding:12px 14px;font-size:14px;margin-bottom:14px}

/* tabs */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  display:flex;background:rgba(19,20,23,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--dim);font-size:11px;font-weight:700;letter-spacing:.04em;padding:8px 0;border-radius:12px;
}
nav button.on{color:var(--chalk)}
nav svg{width:23px;height:23px}

/* toast */
#toast{
  position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
  background:var(--chalk);color:#131417;font-weight:700;font-size:14px;
  padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;z-index:20;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<header>
  <div class="brand">Fierros <small>· registro de gym</small></div>
  <div class="hdate" id="hdate"></div>
</header>
<main id="view"></main>
<nav id="tabs"></nav>
<div id="toast" role="status"></div>

<script>
'use strict';
/* ================= utils ================= */
const $ = s => document.querySelector(s);
const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const DIAS = ['dom','lun','mar','mié','jue','vie','sáb'];
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const COLORS = ['blue','red','yellow','green'];

function fmtDate(iso){ const d = new Date(iso); return DIAS[d.getDay()] + ' ' + d.getDate() + ' ' + MESES[d.getMonth()]; }
function weekStart(iso){ const d = new Date(iso); d.setHours(0,0,0,0); d.setDate(d.getDate() - (d.getDay()+6)%7); return d; }
function daysAgo(iso){
  const a = new Date(iso); a.setHours(0,0,0,0);
  const b = new Date(); b.setHours(0,0,0,0);
  const n = Math.round((b - a) / 86400000);
  return n <= 0 ? 'hoy' : n === 1 ? 'ayer' : 'hace ' + n + ' días';
}
function setPath(obj, path, val){
  const ks = path.split('.');
  let o = obj;
  for (let i = 0; i < ks.length - 1; i++) o = o[ks[i]];
  o[ks[ks.length - 1]] = val;
}
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ================= storage ================= */
const KEY = 'fierros_v1';
let storageOk = true;
function load(){
  try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; }
  catch(e){ storageOk = false; return null; }
}
function persist(){
  try { localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ storageOk = false; }
}

/* ================= seed ================= */
function seed(){
  const ex = (name, sets, reps, w) => ({ id: uid(), name, sets, reps, w });
  return {
    v: 1,
    routine: [
      { id:'d-trac', name:'Tracción', color:'blue', ex:[
        ex('Dominadas', 4, '6-8', 'corp'),
        ex('Remo con barra', 4, '8-10', '40'),
        ex('Pull down', 3, '10-12', ''),
        ex('Face pull', 3, '12-15', '20'),
        ex('Bíceps con mancuernas', 3, '10-12', '10'),
        ex('Hollow hold', 3, '20-30s', ''),
      ]},
      { id:'d-emp', name:'Empuje', color:'red', ex:[
        ex('Banco plano', 4, '8-10', '50'),
        ex('Press militar de pie', 3, '8-10', '30'),
        ex('Inclinado c/mancuernas', 3, '10-12', '15'),
        ex('Fondos', 3, '8-10', 'corp'),
        ex('Vuelos laterales', 3, '12-15', '10'),
        ex('Plancha', 3, '45s', ''),
      ]},
      { id:'d-pier', name:'Pierna', color:'yellow', ex:[
        ex('Back squat', 4, '8', '60'),
        ex('Peso muerto rumano', 3, '8', '70'),
        ex('Hip thrust', 3, '10-12', '50'),
        ex('Gemelos en Smith', 4, '12-15', '80'),
        ex('Leg raise colgado', 3, '10-15', ''),
      ]},
    ],
    logs: [],
    draft: null,
  };
}

/* ================= state ================= */
let state = load() || seed();
let tab = state.draft ? 'entrenar' : 'entrenar';
const expanded = new Set();   // routine editor: expanded exercise ids
const openLogs = new Set();   // history: expanded session ids

/* ================= session actions ================= */
function startSession(dayId){
  let day = state.routine.find(d => d.id === dayId);
  const entries = day ? day.ex.map(e => ({
    name: e.name,
    target: e.sets + '×' + e.reps + (e.w ? ' @' + e.w : ''),
    sets: Array.from({ length: e.sets }, () => ({ w: e.w === 'corp' ? '' : e.w, r: '', done: false })),
  })) : [];
  state.draft = {
    startedAt: new Date().toISOString(),
    day: day ? day.name : 'Sesión libre',
    color: day ? day.color : 'green',
    entries,
    notes: '',
  };
  if (!day) addEntry();
  persist(); render();
}
function addEntry(){
  state.draft.entries.push({ name:'', target:'', sets:[{ w:'', r:'', done:false }] });
}
function saveSession(){
  const d = state.draft;
  const entries = d.entries
    .map(en => ({ ...en, sets: en.sets.filter(s => s.w || s.r || s.done) }))
    .filter(en => en.sets.length && (en.name || '').trim());
  if (!entries.length){ toast('No cargaste ninguna serie'); return; }
  state.logs.push({ id: uid(), date: d.startedAt, day: d.day, color: d.color, notes: (d.notes||'').trim(), entries });
  state.draft = null;
  tab = 'historial';
  persist(); render();
  toast('Sesión guardada');
}

/* ================= actions map ================= */
const A = {
  tab(el){ tab = el.dataset.t; render(); },
  start(el){ startSession(el.dataset.d); },
  free(){ startSession(null); },
  discard(){ if (confirm('¿Descartar la sesión sin guardar?')){ state.draft = null; persist(); render(); } },
  save(){ saveSession(); },
  toggleSet(el){
    const s = state.draft.entries[+el.dataset.i].sets[+el.dataset.j];
    s.done = !s.done; persist(); render();
  },
  addSet(el){
    const sets = state.draft.entries[+el.dataset.i].sets;
    const last = sets[sets.length - 1];
    sets.push({ w: last ? last.w : '', r: '', done: false });
    persist(); render();
  },
  rmSet(el){
    const sets = state.draft.entries[+el.dataset.i].sets;
    if (sets.length > 1){ sets.pop(); persist(); render(); }
  },
  rmEntry(el){
    state.draft.entries.splice(+el.dataset.i, 1);
    persist(); render();
  },
  addEntry(){ addEntry(); persist(); render(); },

  openLog(el){
    const id = el.dataset.id;
    openLogs.has(id) ? openLogs.delete(id) : openLogs.add(id);
    render();
  },
  rmLog(el){
    if (confirm('¿Eliminar esta sesión del historial?')){
      state.logs = state.logs.filter(l => l.id !== el.dataset.id);
      persist(); render();
    }
  },

  toggleEx(el){
    const id = el.dataset.id;
    expanded.has(id) ? expanded.delete(id) : expanded.add(id);
    render();
  },
  addEx(el){
    const day = state.routine.find(d => d.id === el.dataset.d);
    const e = { id: uid(), name:'', sets:3, reps:'8-10', w:'' };
    day.ex.push(e); expanded.add(e.id);
    persist(); render();
  },
  rmEx(el){
    const day = state.routine.find(d => d.id === el.dataset.d);
    day.ex = day.ex.filter(e => e.id !== el.dataset.id);
    persist(); render();
  },
  moveEx(el){
    const day = state.routine.find(d => d.id === el.dataset.d);
    const i = day.ex.findIndex(e => e.id === el.dataset.id);
    const j = i + (+el.dataset.dir);
    if (j < 0 || j >= day.ex.length) return;
    [day.ex[i], day.ex[j]] = [day.ex[j], day.ex[i]];
    persist(); render();
  },
  addDay(){
    const d = { id: uid(), name:'Nuevo día', color: COLORS[state.routine.length % COLORS.length], ex:[] };
    state.routine.push(d);
    persist(); render();
  },
  rmDay(el){
    const day = state.routine.find(d => d.id === el.dataset.d);
    if (confirm('¿Eliminar el día "' + day.name + '" de la rutina? (el historial no se toca)')){
      state.routine = state.routine.filter(d => d.id !== el.dataset.d);
      persist(); render();
    }
  },
  cycleColor(el){
    const day = state.routine.find(d => d.id === el.dataset.d);
    day.color = COLORS[(COLORS.indexOf(day.color) + 1) % COLORS.length];
    persist(); render();
  },

  copy(){
    const data = JSON.stringify({ v: state.v, routine: state.routine, logs: state.logs }, null, 1);
    const done = () => toast('Datos copiados: pegalos en el chat');
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(data).then(done, () => A.showIO(data));
    } else A.showIO(data);
  },
  share(){
    const data = JSON.stringify({ v: state.v, routine: state.routine, logs: state.logs });
    if (navigator.share) navigator.share({ title:'Datos Fierros', text: data }).catch(() => {});
    else A.copy();
  },
  showIO(data){
    const ta = $('#io');
    if (ta){ ta.value = typeof data === 'string' ? data : ''; ta.select(); }
    toast('Copialos desde el cuadro de abajo');
  },
  importar(){
    const raw = ($('#io').value || '').trim();
    if (!raw){ toast('Pegá el JSON en el cuadro primero'); return; }
    try {
      const obj = JSON.parse(raw);
      if (!Array.isArray(obj.routine) || !Array.isArray(obj.logs)) throw 0;
      if (!confirm('Esto reemplaza la rutina y el historial actuales. ¿Seguir?')) return;
      state = { v:1, routine: obj.routine, logs: obj.logs, draft: null };
      persist(); render();
      toast('Datos importados');
    } catch(e){ toast('Ese JSON no es válido'); }
  },
  resetRoutine(){
    if (confirm('¿Volver a la rutina PPL original? (el historial no se toca)')){
      state.routine = seed().routine;
      persist(); render();
      toast('Rutina restaurada');
    }
  },
  wipe(){
    if (confirm('¿Borrar TODO (rutina + historial)? No hay vuelta atrás.')){
      state = seed(); persist(); render();
      toast('Todo borrado');
    }
  },
};

/* ================= views ================= */
function plate(color, sm){ return '<span class="plate ' + (sm?'sm ':'') + 'c-' + esc(color) + '"></span>'; }

function vEntrenar(){
  if (state.draft) return vSession();
  let h = '<div class="eyebrow">¿Qué toca hoy?</div>';
  for (const d of state.routine){
    const last = [...state.logs].reverse().find(l => l.day === d.name);
    h += '<button class="daybtn" data-a="start" data-d="' + d.id + '">'
      + plate(d.color)
      + '<span><span class="dn">' + esc(d.name) + '</span><br>'
      + '<span class="ds">' + d.ex.length + ' ejercicios' + (last ? ' · última vez ' + daysAgo(last.date) : '') + '</span></span>'
      + '<span class="go">›</span></button>';
  }
  h += '<button class="btn line" data-a="free">Sesión libre</button>';
  h += '<p class="empty" style="padding:24px">Entrenaste con un amigo o hiciste otra cosa: usá "Sesión libre" y cargá los ejercicios a mano.</p>';
  return h;
}

function vSession(){
  const d = state.draft;
  let h = '<div class="sesshead">' + plate(d.color)
    + '<span><span class="dn">' + esc(d.day) + '</span><br><span class="dd">' + fmtDate(d.startedAt) + '</span></span>'
    + '<span class="right"><button class="linkbtn" data-a="discard">Descartar</button></span></div>';

  d.entries.forEach((en, i) => {
    h += '<div class="card">'
      + '<input class="exname" placeholder="Nombre del ejercicio" value="' + esc(en.name) + '" data-bind="draft.entries.' + i + '.name">'
      + (en.target ? '<div class="target num">Objetivo: ' + esc(en.target) + '</div>' : '')
      + '<div class="sets">';
    en.sets.forEach((s, j) => {
      h += '<div class="setrow' + (s.done ? ' done' : '') + '">'
        + '<span class="setn num">' + (j+1) + '</span>'
        + '<input class="win num" inputmode="decimal" placeholder="kg" value="' + esc(s.w) + '" data-bind="draft.entries.' + i + '.sets.' + j + '.w">'
        + '<span class="x">×</span>'
        + '<input class="rin num" inputmode="numeric" placeholder="reps" value="' + esc(s.r) + '" data-bind="draft.entries.' + i + '.sets.' + j + '.r">'
        + '<button class="chk" data-a="toggleSet" data-i="' + i + '" data-j="' + j + '" aria-label="Marcar serie">✓</button>'
        + '</div>';
    });
    h += '</div><div class="exfoot">'
      + '<button class="ghost" data-a="addSet" data-i="' + i + '">+ serie</button>'
      + '<button class="ghost" data-a="rmSet" data-i="' + i + '">− serie</button>'
      + '<span class="spacer"></span>'
      + '<button class="ghost danger" data-a="rmEntry" data-i="' + i + '">Quitar</button>'
      + '</div></div>';
  });

  h += '<button class="btn line" data-a="addEntry">+ Ejercicio</button>'
    + '<div class="eyebrow">Notas</div>'
    + '<textarea class="notes" placeholder="Cómo te sentiste, qué ajustar..." data-bind="draft.notes">' + esc(d.notes) + '</textarea>'
    + '<button class="btn" data-a="save">Guardar sesión</button>';
  return h;
}

function vHistorial(){
  if (!state.logs.length) return '<p class="empty">Todavía no guardaste ninguna sesión.<br>Cuando termines de entrenar va a aparecer acá, agrupada por semana.</p>';
  const logs = [...state.logs].sort((a,b) => b.date.localeCompare(a.date));
  let h = '', lastWeek = null;
  for (const l of logs){
    const ws = weekStart(l.date);
    const wk = ws.toISOString().slice(0,10);
    if (wk !== lastWeek){
      lastWeek = wk;
      h += '<div class="eyebrow">Semana del ' + ws.getDate() + ' ' + MESES[ws.getMonth()] + '</div>';
    }
    const nsets = l.entries.reduce((n,e) => n + e.sets.length, 0);
    const open = openLogs.has(l.id);
    h += '<div class="card log">'
      + '<button class="loghead" data-a="openLog" data-id="' + l.id + '">' + plate(l.color || 'green', true)
      + '<span><span class="dn">' + esc(l.day) + '</span><br><span class="ds">' + fmtDate(l.date) + ' · ' + l.entries.length + ' ejercicios · ' + nsets + ' series</span></span>'
      + '<span class="car">' + (open ? '▾' : '▸') + '</span></button>';
    if (open){
      h += '<div class="logbody">';
      for (const e of l.entries){
        h += '<div class="lex"><div class="lname">' + esc(e.name) + '</div>'
          + '<div class="lsets num">' + e.sets.map(s => (s.w || '–') + '×' + (s.r || '–')).join('  ·  ') + '</div>'
          + (e.target ? '<div class="ltarget num">objetivo ' + esc(e.target) + '</div>' : '')
          + '</div>';
      }
      if (l.notes) h += '<div class="lnotes">' + esc(l.notes) + '</div>';
      h += '</div><div class="logactions"><button class="linkbtn" style="color:var(--red)" data-a="rmLog" data-id="' + l.id + '">Eliminar</button></div>';
    }
    h += '</div>';
  }
  return h;
}

function vRutina(){
  let h = '<div class="eyebrow">Tu rutina · tocá un ejercicio para editarlo</div>';
  for (const d of state.routine){
    h += '<div class="card rday"><div class="rhead">'
      + '<button class="plate btnp c-' + esc(d.color) + '" data-a="cycleColor" data-d="' + d.id + '" aria-label="Cambiar color"></button>'
      + '<input class="rname" value="' + esc(d.name) + '" data-bind-day="' + d.id + '">'
      + '<button class="linkbtn" style="color:var(--red)" data-a="rmDay" data-d="' + d.id + '">×</button>'
      + '</div>';
    for (const e of d.ex){
      if (expanded.has(e.id)){
        h += '<div class="redit">'
          + '<div><label>Ejercicio</label><input value="' + esc(e.name) + '" placeholder="Nombre" data-bind-ex="' + d.id + '.' + e.id + '.name"></div>'
          + '<div class="row">'
          + '<div class="f1"><label>Series</label><input class="num" inputmode="numeric" value="' + esc(e.sets) + '" data-bind-ex="' + d.id + '.' + e.id + '.sets"></div>'
          + '<div class="f1"><label>Reps</label><input class="num" value="' + esc(e.reps) + '" data-bind-ex="' + d.id + '.' + e.id + '.reps"></div>'
          + '<div class="f1"><label>Peso</label><input class="num" inputmode="decimal" value="' + esc(e.w) + '" placeholder="kg" data-bind-ex="' + d.id + '.' + e.id + '.w"></div>'
          + '</div><div class="acts">'
          + '<button class="ghost" data-a="moveEx" data-d="' + d.id + '" data-id="' + e.id + '" data-dir="-1">↑</button>'
          + '<button class="ghost" data-a="moveEx" data-d="' + d.id + '" data-id="' + e.id + '" data-dir="1">↓</button>'
          + '<span class="spacer" style="flex:1"></span>'
          + '<button class="ghost danger" data-a="rmEx" data-d="' + d.id + '" data-id="' + e.id + '">Eliminar</button>'
          + '<button class="ghost" data-a="toggleEx" data-id="' + e.id + '">Listo</button>'
          + '</div></div>';
      } else {
        h += '<button class="rex" data-a="toggleEx" data-id="' + e.id + '">'
          + '<span class="rn">' + (esc(e.name) || '<span style="color:var(--dim)">Sin nombre</span>') + '</span>'
          + '<span class="rs num">' + esc(e.sets) + '×' + esc(e.reps) + (e.w ? ' @' + esc(e.w) : '') + '</span></button>';
      }
    }
    h += '<div style="margin-top:10px"><button class="ghost" data-a="addEx" data-d="' + d.id + '">+ Ejercicio</button></div></div>';
  }
  h += '<button class="btn line" data-a="addDay">+ Día</button>';
  return h;
}

function vDatos(){
  let h = '';
  if (!storageOk) h += '<div class="warn">Este entorno no guarda datos entre sesiones. Abrí la app instalada desde Chrome para que todo persista.</div>';
  h += '<div class="eyebrow">Tus datos</div>'
    + '<div class="card"><p class="datainfo">Para que Claude analice tu progreso o ajuste la rutina: copiá los datos y pegalos en el chat.</p>'
    + '<button class="btn" data-a="copy">Copiar datos (JSON)</button>'
    + '<button class="btn line" data-a="share">Compartir…</button></div>'
    + '<div class="eyebrow">Importar</div>'
    + '<div class="card"><p class="datainfo">Pegá acá un JSON exportado (de esta app o armado por Claude) para reemplazar rutina e historial.</p>'
    + '<textarea class="io" id="io" placeholder="Pegá el JSON acá"></textarea>'
    + '<button class="btn line" data-a="importar">Importar</button></div>'
    + '<div class="eyebrow">Zona de riesgo</div>'
    + '<div class="card">'
    + '<button class="btn line" data-a="resetRoutine">Restaurar rutina PPL original</button>'
    + '<button class="btn danger" data-a="wipe">Borrar todo</button></div>';
  return h;
}

/* ================= tabs & render ================= */
const ICONS = {
  entrenar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1.5 12h2M20.5 12h2M7.5 12h9"/><path d="M5 8.5v7M19 8.5v7M8.5 6.5v11M15.5 6.5v11"/></svg>',
  historial: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
  rutina: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.4" fill="currentColor" stroke="none"/></svg>',
  datos: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v11"/><path d="M8 10l4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>',
};
const TABS = [['entrenar','Entrenar'],['historial','Historial'],['rutina','Rutina'],['datos','Datos']];

function render(){
  $('#hdate').textContent = fmtDate(new Date().toISOString());
  $('#tabs').innerHTML = TABS.map(([k, label]) =>
    '<button class="' + (tab === k ? 'on' : '') + '" data-a="tab" data-t="' + k + '">' + ICONS[k] + label + '</button>'
  ).join('');
  const views = { entrenar: vEntrenar, historial: vHistorial, rutina: vRutina, datos: vDatos };
  $('#view').innerHTML = views[tab]();
  window.scrollTo(0, 0);
}

/* ================= events ================= */
document.addEventListener('click', e => {
  const el = e.target.closest('[data-a]');
  if (el && A[el.dataset.a]) A[el.dataset.a](el);
});
document.addEventListener('input', e => {
  const el = e.target;
  if (el.dataset.bind){
    setPath(state, el.dataset.bind, el.value);
    persist();
  } else if (el.dataset.bindDay){
    const d = state.routine.find(x => x.id === el.dataset.bindDay);
    if (d){ d.name = el.value; persist(); }
  } else if (el.dataset.bindEx){
    const [dayId, exId, field] = el.dataset.bindEx.split('.');
    const d = state.routine.find(x => x.id === dayId);
    const ex = d && d.ex.find(x => x.id === exId);
    if (ex){
      ex[field] = field === 'sets' ? Math.max(1, parseInt(el.value, 10) || 1) : el.value;
      persist();
    }
  }
});

render();
if ('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
